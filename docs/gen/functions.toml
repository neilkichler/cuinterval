[functions.equal]
args = ['I', 'I']
ret = 'B'
code_name = 'equal'
latex_name = '='
arg_names = ['a', 'b']
source = 'include/cuinterval/arithmetic/basic.cuh#L550'
group = 'Boolean'
brief = 'Returns true if intervals $$a$$ and $$b$$ are equal.'
description = '''For $a, b\neq \emptyset$:

<Centered>
    $\underline{a} = \underline{b} \land \bar{a} = \bar{b}$.
</Centered>

Otherwise:
<div style="margin-left: auto; margin-right: auto; width: 35%">
    | $a = \emptyset$ | $b = \emptyset$ | $a = b$ |
    |:---------------:|:---------------:|:-------:|
    |      $0$        |      $1$        |   $0$   |
    |      $1$        |      $0$        |   $0$   |
    |      $1$        |      $1$        |   $1$   |
</div>
'''

[functions.subset]
args = ['I', 'I']
ret = 'B'
code_name = 'subset'
latex_name = '\subseteq'
arg_names = ['a', 'b']
source = 'include/cuinterval/arithmetic/basic.cuh#L562'
group = 'Boolean'
brief = 'Returns true if $$a$$ is a subset of $$b$$.'
description = '''For $a, b\neq \emptyset$:

<Centered>
    $\underline{b} \leq \underline{a} \land \bar{a} \leq \bar{b}$.
</Centered>

Otherwise:
<div style="margin-left: auto; margin-right: auto; width: 35%">
    | $a = \emptyset$ | $b = \emptyset$ | $a \subseteq b$ |
    |:---------------:|:---------------:|:---------------:|
    |      $0$        |      $1$        |       $0$       |
    |      $1$        |      $0$        |       $1$       |
    |      $1$        |      $1$        |       $1$       |
</div>
'''

[functions.interior]
args = ['I', 'I']
ret = 'B'
code_name = 'interior'
latex_name = '\mathrm{interior}'
arg_names = ['a', 'b']
source = 'include/cuinterval/arithmetic/basic.cuh#L568'
group = 'Boolean'
brief = 'Returns true if $$a$$ is in the interior of $$b$$.'
description = '''For $a, b\neq \emptyset$:

<Centered>
    $\underline{b} < \underline{a} \land \bar{a} < \bar{b}$.
</Centered>

Otherwise:
<div style="margin-left: auto; margin-right: auto; width: 35%">
    | $a = \emptyset$ | $b = \emptyset$ | $a \subset b$ |
    |:---------------:|:---------------:|:-------------:|
    |      $0$        |      $1$        |      $0$      |
    |      $1$        |      $0$        |      $1$      |
    |      $1$        |      $1$        |      $1$      |
</div>
'''

[functions.disjoint]
args = ['I', 'I']
ret = 'B'
code_name = 'disjoint'
latex_name = '\mathrm{disjoint}'
arg_names = ['a', 'b']
source = 'include/cuinterval/arithmetic/basic.cuh#L574'
group = 'Boolean'
brief = 'Returns true if intervals $$a$$ and $$b$$ are disjoint.'
description = '''For $a, b\neq \emptyset$:

<Centered>
    $\bar{a} < \underline{b} \lor \bar{b} < \underline{a}$.
</Centered>

Otherwise:
<div style="margin-left: auto; margin-right: auto; width: 40%">
    | $a = \emptyset$ | $b = \emptyset$ | $a \cap b = \emptyset$ |
    |:---------------:|:---------------:|:----------------------:|
    |      $0$        |      $1$        |           $1$          |
    |      $1$        |      $0$        |           $1$          |
    |      $1$        |      $1$        |           $1$          |
</div>
'''

